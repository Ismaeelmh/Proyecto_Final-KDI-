<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu de Juegos</title>
    <link rel="stylesheet" href="menu.css">
</head>

<body>

    <h2>Menu de Juegos</h2>

    <!-- SERPIENTE -->
    <div class="game">

        <img src="serpiente.png.png" alt="Serpiente">

        <div class="buttons">
            <button onclick="abrirSerpiente(1)">🎮 Jugar Solo</button>
            <button onclick="abrirSerpiente(2)">👥 Multijugador</button>
        </div>

    </div>

    <!-- BUSCAMINAS -->
    <div class="game">

        <img src="imagenes/buscaminas.png" alt="Buscaminas">

        <div class="buttons">
            <button onclick="abrirBuscaminas()">🎮 Jugar</button>
            <button onclick="abrirBuscaminas()">⚙️ Modo clásico</button>
        </div>

    </div>

    <br>

    <!-- LOGOUT -->
    <button onclick="logout()">Cerrar sesión</button>

</body>

<script>

function abrirSerpiente(modo) {
    window.location.href = "/Juegos/serpiente/build/web/index.html?modo=" + modo;
}

function abrirBuscaminas() {
    window.location.href = "/Juegos/buscaminas/build/web/index.html";
}

function logout() {
    window.location.href = "login.html";
}

</script>

</html>
