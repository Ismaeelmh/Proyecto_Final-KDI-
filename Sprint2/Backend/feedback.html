<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Saguacate</title>
    <link rel="stylesheet" href="feedback.css">
</head>

<body>

<div class="container">

    <h1>Feedback del juego</h1>

    <p id="juegoNombre"></p>

    <textarea id="comentario" placeholder="Escribe tu opinión..."></textarea>

    <button onclick="enviarFeedback()">Enviar</button>

    <button onclick="volverMenu()">Volver al menú</button>

</div>

<script>

// cargar juego desde localStorage
const juego = localStorage.getItem("feedbackJuego");
const usuario = localStorage.getItem("usuario");

// mostrar juego en pantalla
document.getElementById("juegoNombre").textContent =
    "Juego: " + (juego || "NO DEFINIDO");

function enviarFeedback() {

    const texto = document.getElementById("comentario").value;

    console.log("usuario:", usuario);
    console.log("juego:", juego);
    console.log("mensaje:", texto);

    if (!texto) {
        alert("Escribe algo primero");
        return;
    }

    if (!usuario || !juego) {
        alert("Falta usuario o juego (localStorage vacío)");
        return;
    }

    fetch("/api/feedback", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: usuario,
            mensaje: texto,
            juego: juego
        })
    })
    .then(async res => {

        const data = await res.json();

        console.log("respuesta backend:", data);

        if (!res.ok) {
            alert(data.error || "Error del servidor");
            return;
        }

        alert("Feedback enviado correctamente");

        document.getElementById("comentario").value = "";

    })
    .catch(err => {
        console.error(err);
        alert("Error de conexión con el servidor");
    });
}

function volverMenu() {
    window.location.href = "/menu";
}

</script>

</body>
</html>
