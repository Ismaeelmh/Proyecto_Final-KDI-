<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Saguacate</title>
    <link rel="stylesheet" href="feedback.css">
</head>

<body>

<div class="container">

    <h1>Feedback del juego</h1>

    <p id="juegoNombre"></p>

    <!-- CHAT -->
    <div id="chatBox"></div>

    <!-- INPUT -->
    <textarea id="comentario" placeholder="Escribe tu opinión..."></textarea>

    <button onclick="enviarFeedback()">Enviar</button>
    <button class="volver" onclick="volverMenu()">Volver al menú</button>

</div>

<script>

const juego = localStorage.getItem("feedbackJuego");

// mostrar juego
document.getElementById("juegoNombre").textContent = "Juego: " + juego;

// cargar chat
function cargarChat() {
    fetch("/api/feedback/" + juego)
        .then(res => res.json())
        .then(data => {

            const chat = document.getElementById("chatBox");
            chat.innerHTML = "";

            data.forEach(msg => {

                const div = document.createElement("div");
                div.classList.add("mensaje");

                div.innerHTML = `
                    <b>${msg.usuario}</b>
                    <p>${msg.comentario}</p>
                    <small>${msg.fecha}</small>
                `;

                chat.appendChild(div);
            });

            chat.scrollTop = chat.scrollHeight;
        })
        .catch(err => {
            console.error("Error cargando chat:", err);
        });
}

// enviar mensaje
function enviarFeedback() {

    const texto = document.getElementById("comentario").value;
    const usuario = localStorage.getItem("usuario");

    if (!texto) {
        alert("Escribe algo primero");
        return;
    }

    fetch("/api/feedback", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            juego,
            comentario: texto,
            usuario
        })
    })
    .then(res => res.json())
    .then(() => {
        document.getElementById("comentario").value = "";
        cargarChat();
    })
    .catch(err => {
        console.error(err);
        alert("Error al enviar feedback");
    });
}

// volver menú
function volverMenu() {
    window.location.href = "menu.html";
}

// iniciar chat
cargarChat();

// auto actualización (cada 2s)
setInterval(cargarChat, 2000);

</script>

</body>
</html>
