<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saguacate</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='menu.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='imagenes/favicon.png') }}" type="image/png">
</head>

<body>

<header>
    <h1>Saguacate</h1>

    <button class="perfil" onclick="abrirPerfil()">
        <span id="nombreUsuario"></span>
    </button>
</header>

<div class="games-container">

    <!-- SERPIENTE -->
    <div class="game-column">

        <div class="game" onclick="abrirSerpiente()">
            <img src="{{ url_for('static', filename='imagenes/cobra.png') }}" alt="Serpiente">
            <h2>Serpiente</h2>
        </div>

        <div class="snake-buttons">

            <button class="play-btn" onclick="abrirSerpiente(event)">
                Jugar solo
            </button>

            <button class="multi-btn" onclick="abrirSerpienteMulti(event)">
                Multijugador
            </button>

        </div>

    </div>

    <!-- BUSCAMINAS -->
    <div class="game-column">

        <div class="game" onclick="abrirBuscaminas()">
            <img src="{{ url_for('static', filename='imagenes/buscaminas.jpg') }}" alt="Buscaminas">
            <h2>Buscaminas</h2>
        </div>

        <button class="play-btn" onclick="abrirBuscaminas()">
            Jugar
        </button>

    </div>

</div>

<!-- PANEL INFERIOR -->
<div class="bottom-panel">

    <button onclick="abrirPerfil()">Perfil</button>
    <button onclick="abrirFeedback('serpiente')">Feedback Serpiente</button>
    <button onclick="abrirFeedback('buscaminas')">Feedback Buscaminas</button>
    <button onclick="abrirRankings()">Rankings</button>
    <button onclick="logout()">Cerrar sesión</button>

</div>

<script>

// SERPIENTE SOLO
function abrirSerpiente(e) {
    if (e) e.stopPropagation();
    window.location.href = "/Juegos/serpiente/build/web/index.html?modo=1";
}

// SERPIENTE MULTI
function abrirSerpienteMulti(e) {
    if (e) e.stopPropagation();
    window.location.href = "/Juegos/serpiente/build/web/index.html?modo=2";
}

// BUSCAMINAS
function abrirBuscaminas() {
    window.location.href = "/Juegos/buscaminas/build/web/index.html";
}

// PERFIL
function abrirPerfil() {
    window.location.href = "/perfil";
}

// FEEDBACK (IMPORTANT FIX)
function abrirFeedback(juego) {
    localStorage.setItem("feedbackJuego", juego);
    window.location.href = "/feedback";
}

// RANKINGS
function abrirRankings() {
    window.location.href = "/rankings";
}

// LOGOUT
function logout() {
    window.location.href = "/login";
}

// USER NAME
document.addEventListener("DOMContentLoaded", function () {
    const usuario = localStorage.getItem("usuario");

    document.getElementById("nombreUsuario").textContent =
        usuario ? usuario : "Perfil";
});

</script>

</body>
</html>
