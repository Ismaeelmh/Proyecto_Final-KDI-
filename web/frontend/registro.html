<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='registro.css') }}">
</head>

<body>

<div class="container">
    <div class="left">

        <h1 class="titulo-principal">Saguacate</h1>
        <h2>Registro</h2>

        <div class="form">

            <label>Nombre de usuario</label>
            <input id="username" placeholder="Nombre de usuario">

            <label>Email</label>
            <input id="email" placeholder="Email">

            <label>Contraseña</label>
            <input id="password" type="password" placeholder="Contraseña">

            <button onclick="registrar()">Registrar</button>

            <p class="login-text">
                ¿Ya tienes cuenta?
                <a href="/login">Inicia sesión</a>
            </p>


        </div>
    </div>

    <div class="right">
        <img src="{{ url_for('static', filename='imagenes/logo.png') }}">
    </div>
</div>
<script>
function registrar() {
    const data = {
        username: document.getElementById("username").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    fetch("/api/registro",{
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        if (res.error) {
            alert(res.error);
        } else {
            alert(res.message || "Usuario registrado");
            window.location.replace("/login");
        }
    })
    .catch(err => {
        console.error(err);
    });
}
</script>
