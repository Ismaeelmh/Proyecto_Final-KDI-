<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Saguacate</title>

    <link rel="stylesheet" href="feedback.css">
</head>

<body>

<div class="container">

    <h1>Feedback del juego</h1>

    <p id="juegoNombre"></p>

    <!-- CHAT -->
    <div id="chatBox"></div>

    <!-- INPUT -->
    <textarea
        id="comentario"
        placeholder="Escribe tu opinión..."
        maxlength="500"
    ></textarea>

    <button onclick="enviarFeedback()">
        Enviar
    </button>

    <button class="volver" onclick="volverMenu()">
        Volver al menú
    </button>

</div>

<script>

// cargar juego desde localStorage
const juego = localStorage.getItem("feedbackJuego");
const usuario = localStorage.getItem("usuario");

// mostrar juego
document.getElementById("juegoNombre").textContent =
    "Juego: " + juego;


// CARGAR CHAT
function cargarChat() {

    fetch("/api/feedback/" + juego)

    .then(res => res.json())

    .then(data => {

        const chat = document.getElementById("chatBox");

        chat.innerHTML = "";

        data.forEach(msg => {

            const div = document.createElement("div");

            div.classList.add("mensaje");

            div.innerHTML = `
                <b>${msg.username}</b>
                <p>${msg.mensaje}</p>
                <small>${msg.fecha}</small>
            `;

            chat.appendChild(div);

        });

        chat.scrollTop = chat.scrollHeight;

    })

    .catch(err => {

        console.error("Error cargando chat:", err);

    });

}


// ENVIAR FEEDBACK
function enviarFeedback() {

    const texto = document.getElementById("comentario").value.trim();

    console.log("usuario:", usuario);
    console.log("juego:", juego);
    console.log("mensaje:", texto);

    // validaciones
    if (!texto) {

        alert("Escribe algo primero");
        return;

    }

    if (texto.length < 3) {

        alert("Mensaje demasiado corto");
        return;

    }

    if (texto.length > 500) {

        alert("Mensaje demasiado largo");
        return;

    }

    if (!usuario || !juego) {

        alert("Falta usuario o juego");
        return;

    }

    // POST API
    fetch("/api/feedback", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({

            username: usuario,
            mensaje: texto,
            juego: juego

        })

    })

    .then(async res => {

        const data = await res.json();

        if (!res.ok) {

            throw new Error(data.error || "Error");

        }

        return data;

    })

    .then(data => {

        console.log(data);

        document.getElementById("comentario").value = "";

        cargarChat();

    })

    .catch(err => {

        console.error(err);

        alert(err.message);

    });

}


// VOLVER AL MENÚ
function volverMenu() {

    window.location.href = "/menu";

}


// iniciar chat
cargarChat();


// auto actualización
setInterval(cargarChat, 2000);

</script>

</body>
</html>
