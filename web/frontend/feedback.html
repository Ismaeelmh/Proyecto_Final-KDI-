<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='feedback.css') }}"> 
    <link rel="icon" href="{{ url_for('static', filename='imagenes/favicon.png') }}" type="image/png">
</head>

<body>

<div class="container">

    <h1>Feedback</h1>

    <p id="juegoNombre"></p>

    <div id="chatBox"></div>

    <textarea id="comentario" placeholder="Escribe algo..."></textarea>

    <button onclick="enviarFeedback()">Enviar</button>
    <button onclick="volverMenu()">Volver</button>

</div>

<script>

// =====================
// DATOS
// =====================
const usuario = localStorage.getItem("usuario");
const juego = localStorage.getItem("feedbackJuego");


// =====================
// CARGAR CHAT
// =====================
function cargarChat() {

    if (!juego) return;

    fetch("/api/feedback/" + juego)
        .then(res => res.json())
        .then(data => {

            const chat = document.getElementById("chatBox");
            chat.innerHTML = "";

            data.forEach(m => {

                chat.innerHTML += `
                    <div class="mensaje">
                        <b>${m.username}</b>
                        <p>${m.mensaje}</p>
                    </div>
                `;

            });

        })
        .catch(() => {});

}


// =====================
// ENVIAR FEEDBACK
// =====================
async function enviarFeedback() {

    const texto = document.getElementById("comentario").value.trim();

    if (!texto) return;

    if (!usuario || !juego) {
        alert("Falta usuario o juego");
        return;
    }

    try {

        const res = await fetch("/api/feedback", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: usuario,
                mensaje: texto,
                juego: juego
            })
        });

        const text = await res.text();

        console.log("RESPUESTA:", text);

        if (!res.ok) {
            alert("Error: " + text);
            return;
        }

        document.getElementById("comentario").value = "";
        cargarChat();

    } catch (err) {

        console.error(err);
        alert("Error del servidor");

    }

}


// =====================
// VOLVER
// =====================
function volverMenu() {
    window.location.href = "/menu";
}


// =====================
// INICIO
// =====================
cargarChat();
setInterval(cargarChat, 2000);

</script>

</body>
</html>
