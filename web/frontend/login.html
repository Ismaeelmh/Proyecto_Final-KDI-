<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" href="/imagenes/logo_saguacate.png" type="image/png">
    <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="container">
    
    <!-- IZQUIERDA -->
    <div class="left">
        <div class="form">

            <h1 class="titulo-principal">SAGUACATE</h1>
            <h2>Login</h2>

            <label>Usuario</label>
            <input id="username" placeholder="Username">

            <label>Contraseña</label>
            <input id="password" type="password" placeholder="Password">

            <button onclick="login()">Iniciar sesión</button>

        </div>
    </div>

    <!-- DERECHA -->
    <div class="right">
        <img src="/imagenes/logo_saguacate.png" alt="imagen">
    </div>

</div>

<script>
function login() {
    const data = {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
    };

    if (!data.username || !data.password) {
        alert("Rellena todos los campos");
        return;
    }

    fetch("/api/login", {
    method: "POST",
    headers: {
        "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
})
.then(res => res.json())
.then(res => {

    if (res.error) {
        alert(res.error);
        return;
    }

    // 🟢 GUARDAR USUARIO CORRECTAMENTE
    localStorage.setItem("usuario", res.user.username);

    alert("Login correcto");

    window.location.replace("/menu");
})
.catch(err => {
    console.error(err);
    alert("Error del servidor");
});
}
</script>

</body>
</html>
