<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='perfil.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='imagenes/favicon.png') }}">
</head>

<body>

<div class="container">

    <h1>Perfil</h1>
    <div class="info">

        <p>
            <b>Nombre:</b>
            <span id="nombre"></span>
        </p>
        <p>
            <b>Correo:</b>
            <span id="correo"></span>
        </p>

    </div>

    <div class="password-box">

        <h3>Cambiar contraseña</h3>

        <input
            type="password"
            id="oldPass"
            placeholder="Contraseña actual"
        >

        <input
            type="password"
            id="newPass"
            placeholder="Nueva contraseña"
        >

        <button onclick="cambiarPassword()">
            Actualizar contraseña
        </button>

        <p id="estado"></p>

    </div>

    <button onclick="volverMenu()">
        Volver al menú
    </button>

</div>

<script>

// CARGAR PERFIL
const usuario = localStorage.getItem("usuario");
const email = localStorage.getItem("email");

document.getElementById("nombre").textContent =
    usuario || "No logueado";

document.getElementById("correo").textContent =
    email || "No disponible";


// CAMBIAR PASSWORD
async function cambiarPassword() {

    const oldPass =
        document.getElementById("oldPass").value;

    const newPass =
        document.getElementById("newPass").value;

    const estado =
        document.getElementById("estado");

    if (!oldPass || !newPass) {

        estado.textContent =
            "Rellena todos los campos";

        return;

    }

    try {

        const res = await fetch(
            "/api/users/change-password",
            {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    username: usuario,
                    oldPassword: oldPass,
                    newPassword: newPass

                })

            }
        );

        const data = await res.json();

        if (data.error) {

            estado.textContent =
                " " + data.error;

        } else {

            estado.textContent =
                " Contraseña actualizada";

        }

    } catch {

        estado.textContent =
            " Error del servidor";

    }

}

function volverMenu() {

    window.location.href = "/menu";

}

</script>

</body>
</html>
